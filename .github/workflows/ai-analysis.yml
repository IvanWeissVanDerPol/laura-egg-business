# ============================================
# Granja Cabral - AI Analysis Workflow
# ============================================
# Runs AI analysis on markdown files for:
# - Content classification
# - Auto-tagging
# - Related file detection
# - Duplicate detection
# - Priority analysis

name: 🤖 AI Analysis

on:
  # Run on push to main branch
  push:
    branches: [main, master]
    paths:
      - '**/*.md'
  
  # Run weekly on Monday at 6am UTC
  schedule:
    - cron: '0 6 * * 1'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      analysis_type:
        description: 'Type of analysis to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - stats
          - duplicates
          - related
          - tags

# Permissions
permissions:
  contents: write
  issues: write

jobs:
  # ============================================
  # JOB 1: AI Content Analysis
  # ============================================
  analyze:
    name: 🤖 AI Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🤖 Run AI Analysis
        id: analysis
        env:
          ANALYSIS_TYPE: ${{ inputs.analysis_type || 'all' }}
        run: |
          echo "🤖 Running AI analysis..."
          echo "Analysis type: $ANALYSIS_TYPE"
          echo ""
          
          # Run stats
          if [ "$ANALYSIS_TYPE" = "all" ] || [ "$ANALYSIS_TYPE" = "stats" ]; then
            echo "📊 STATISTICS"
            echo "============="
            python .github/scripts/ai_organizer.py --stats
            echo ""
          fi
          
          # Run duplicate detection
          if [ "$ANALYSIS_TYPE" = "all" ] || [ "$ANALYSIS_TYPE" = "duplicates" ]; then
            echo "🔄 DUPLICATE CHECK"
            echo "=================="
            python .github/scripts/ai_organizer.py --duplicates
            echo ""
          fi
          
          # Save JSON for artifacts
          python .github/scripts/ai_organizer.py --json > analysis_report.json
          
          # Extract stats for summary
          echo "stats_generated=true" >> $GITHUB_OUTPUT
      
      - name: 📊 Generate Analysis Summary
        if: success()
        run: |
          echo "## 🤖 AI Analysis Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key Findings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Parse JSON for summary
          if [ -f analysis_report.json ]; then
            TOTAL=$(python -c "import json; print(json.load(open('analysis_report.json'))['statistics']['total_files'])")
            CONF=$(python -c "import json; print(f\"{json.load(open('analysis_report.json'))['statistics']['avg_confidence']:.0%}\")")
            
            echo "- **Files analyzed**: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Avg confidence**: $CONF" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: 📤 Upload Analysis Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis-report
          path: analysis_report.json
          retention-days: 90
      
      - name: 💬 Create Issue if Duplicates Found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Duplicate Files Detected - Action Required',
              body: `## AI Analysis Detected Duplicate Files
              
              The automated AI analysis found potential duplicate files that need review.
              
              Please run:
              \`\`\`bash
              python .github/scripts/ai_organizer.py --duplicates
              \`\`\`
              
              And review the output.
              
              ---
              *Auto-generated by Granja Cabral AI Bot*`,
              labels: ['maintenance', 'ai-generated']
            });

  # ============================================
  # JOB 2: Smart Subgroup Recommendations
  # ============================================
  recommend:
    name: 🧠 Smart Recommendations
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 🧠 Generate Recommendations
        run: |
          echo "🧠 Generating smart recommendations..."
          echo ""
          python .github/scripts/ai_organizer.py --tags
          
          # Save recommendations
          python .github/scripts/ai_organizer.py --json > recommendations.json
